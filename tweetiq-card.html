<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TweetIQ Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card-container {
      width: 100%;
      max-width: 1200px;
    }

    .share-card {
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 1200/450;
      background: #0a0a0a;
      border-radius: 16px;
      overflow: hidden;
      font-family: 'Bricolage Grotesque', sans-serif;
      position: relative;
      box-sizing: border-box;
      padding: 40px 48px;
      border: 1px solid #333;
    }

    /* Header row: avatar+name left, IQ score right */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile-section {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #f97316;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-name {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      color: #fff;
    }

    .profile-handle {
      margin-top: 4px;
      font-size: 15px;
      font-weight: 600;
      color: #f97316;
      font-family: 'JetBrains Mono', monospace;
    }

    .score-section {
      text-align: right;
    }

    .score-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #777;
      font-family: 'JetBrains Mono', monospace;
    }

    .score-value {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #333;
      margin: 28px 0 32px;
    }

    /* DNA bars full width */
    .dna-bars {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .dna-bar-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .dna-label {
      width: 130px;
      flex-shrink: 0;
      font-size: 16px;
      font-weight: 600;
      color: #ccc;
      font-family: 'JetBrains Mono', monospace;
    }

    .dna-progress {
      flex: 1;
      height: 16px;
      background: #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }

    .dna-fill {
      height: 100%;
      background: #f97316;
      border-radius: 8px;
      transition: width 0.3s ease;
    }

    .dna-value {
      width: 40px;
      text-align: right;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    /* Download button */
    .download-section {
      margin-top: 20px;
      text-align: center;
    }

    .download-btn {
      background: #f97316;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .download-btn:hover {
      opacity: 0.85;
    }

    .download-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div id="shareCard" class="share-card">
      <!-- Header row: avatar+name left, IQ score right -->
      <div class="card-header">
        <div class="profile-section">
          <div id="scAv" class="avatar">EL</div>
          <div class="profile-info">
            <div id="scN" class="profile-name">Elon Musk</div>
            <div id="scH" class="profile-handle">@elonmusk</div>
          </div>
        </div>
        <div class="score-section">
          <div class="score-label">IQ Score</div>
          <div id="scScore" class="score-value">78</div>
        </div>
      </div>
      
      <!-- Divider -->
      <div class="divider"></div>
      
      <!-- DNA bars full width -->
      <div class="dna-bars">
        <div class="dna-bar-row">
          <span class="dna-label">Viral Hook</span>
          <div class="dna-progress">
            <div id="scBarViral" class="dna-fill" style="width: 84%;"></div>
          </div>
          <span id="scValViral" class="dna-value">84</span>
        </div>
        <div class="dna-bar-row">
          <span class="dna-label">Opinion</span>
          <div class="dna-progress">
            <div id="scBarOpinion" class="dna-fill" style="width: 91%;"></div>
          </div>
          <span id="scValOpinion" class="dna-value">91</span>
        </div>
        <div class="dna-bar-row">
          <span class="dna-label">Humor</span>
          <div class="dna-progress">
            <div id="scBarHumor" class="dna-fill" style="width: 72%;"></div>
          </div>
          <span id="scValHumor" class="dna-value">72</span>
        </div>
        <div class="dna-bar-row">
          <span class="dna-label">Depth</span>
          <div class="dna-progress">
            <div id="scBarDepth" class="dna-fill" style="width: 58%;"></div>
          </div>
          <span id="scValDepth" class="dna-value">58</span>
        </div>
        <div class="dna-bar-row">
          <span class="dna-label">Storytelling</span>
          <div class="dna-progress">
            <div id="scBarStorytelling" class="dna-fill" style="width: 44%;"></div>
          </div>
          <span id="scValStorytelling" class="dna-value">44</span>
        </div>
      </div>
    </div>

    <div class="download-section">
      <button class="download-btn" onclick="downloadCard()">Download Card</button>
    </div>
  </div>

  <script>
    // Sample data - you can update this with real data
    const cardData = {
      profile: {
        name: "Elon Musk",
        username: "elonmusk",
        profileImageUrl400: null
      },
      analysis: {
        contentDNA: {
          viralHook: 84,
          opinion: 91,
          humor: 72,
          depth: 58,
          storytelling: 44
        }
      },
      tweetIQScore: 78
    };

    // Update card with data
    function updateCard(data) {
      document.getElementById('scN').textContent = data.profile.name;
      document.getElementById('scH').textContent = '@' + data.profile.username;
      document.getElementById('scScore').textContent = data.tweetIQScore;

      const scAv = document.getElementById('scAv');
      if (data.profile.profileImageUrl400) {
        scAv.innerHTML = `<img src="${data.profile.profileImageUrl400}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
      } else {
        scAv.textContent = data.profile.name.slice(0, 2).toUpperCase();
      }

      // Update DNA bars
      const dna = data.analysis.contentDNA;
      document.getElementById('scValViral').textContent = dna.viralHook;
      document.getElementById('scBarViral').style.width = dna.viralHook + '%';
      
      document.getElementById('scValOpinion').textContent = dna.opinion;
      document.getElementById('scBarOpinion').style.width = dna.opinion + '%';
      
      document.getElementById('scValHumor').textContent = dna.humor;
      document.getElementById('scBarHumor').style.width = dna.humor + '%';
      
      document.getElementById('scValDepth').textContent = dna.depth;
      document.getElementById('scBarDepth').style.width = dna.depth + '%';
      
      document.getElementById('scValStorytelling').textContent = dna.storytelling;
      document.getElementById('scBarStorytelling').style.width = dna.storytelling + '%';
    }

    // Download card function
    async function downloadCard() {
      const btn = document.querySelector('.download-btn');
      btn.textContent = 'Generating...';
      btn.disabled = true;

      try {
        // Load html2canvas if not already loaded
        if (!window.html2canvas) {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
          document.head.appendChild(s);
          await new Promise(r => s.onload = r);
        }

        const card = document.getElementById('shareCard');
        const originalStyle = card.style.cssText;

        // Set fixed dimensions for consistent export
        card.style.width = '1200px';
        card.style.maxWidth = '1200px';
        card.style.aspectRatio = '1200/450';

        await new Promise(r => setTimeout(r, 100));

        const canvas = await html2canvas(card, {
          backgroundColor: '#0a0a0a',
          scale: 2,
          useCORS: true,
          allowTaint: true,
          logging: false,
          width: 1200,
          height: 450
        });

        // Restore original style
        card.style.cssText = originalStyle;

        // Download the image
        const a = document.createElement('a');
        a.download = `tweetiq-${cardData.profile.username}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();

      } catch (e) {
        console.error('Download failed:', e);
        alert('Download failed. Try screenshotting instead.');
      }

      btn.textContent = 'Download Card';
      btn.disabled = false;
    }

    // Initialize card with sample data
    updateCard(cardData);
  </script>
</body>
</html>
